<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AIGC 全能课程展示 PPT</title>
  <style>
    :root {
      --ink: #12182b;
      --muted: #667085;
      --line: rgba(18, 24, 43, 0.1);
      --card: rgba(255, 255, 255, 0.82);
      --card-strong: rgba(255, 255, 255, 0.94);
      --shadow: 0 28px 80px rgba(31, 41, 70, 0.18);
      --blue: #4f8cff;
      --purple: #8067ff;
      --green: #36c58a;
      --yellow: #ffc857;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      color: var(--ink);
      font-family: "Noto Sans SC", "Roboto", "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
      background:
        radial-gradient(circle at 10% 12%, rgba(79, 140, 255, 0.24), transparent 30%),
        radial-gradient(circle at 88% 10%, rgba(128, 103, 255, 0.2), transparent 28%),
        linear-gradient(135deg, #f6f9ff 0%, #fbf7ff 48%, #f2fbf8 100%);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(18, 24, 43, 0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(18, 24, 43, 0.04) 1px, transparent 1px);
      background-size: 42px 42px;
      mask-image: linear-gradient(to bottom, rgba(0, 0, 0, 0.66), transparent 78%);
    }

    .deck {
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 30px 84px;
    }

    .slide {
      --accent: var(--blue);
      --accent-2: var(--purple);
      --tint: rgba(79, 140, 255, 0.09);
      position: absolute;
      width: min(1240px, calc(100vw - 168px));
      min-height: min(704px, calc(100vh - 92px));
      display: none;
      grid-template-rows: auto 1fr;
      gap: 22px;
      padding: 38px;
      overflow: hidden;
      border-radius: 30px;
      border: 1px solid rgba(255, 255, 255, 0.74);
      background:
        linear-gradient(145deg, rgba(255, 255, 255, 0.95), rgba(255, 255, 255, 0.68)),
        linear-gradient(135deg, var(--tint), transparent 58%);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
      animation: enter 360ms cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    .slide.active {
      display: grid;
    }

    .slide::after {
      content: "";
      position: absolute;
      right: -62px;
      bottom: -78px;
      width: 320px;
      height: 320px;
      border-radius: 82px;
      opacity: 0.1;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      transform: rotate(15deg);
      pointer-events: none;
    }

    @keyframes enter {
      from {
        opacity: 0;
        transform: translateY(18px) scale(0.985);
      }

      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @keyframes float {
      0%, 100% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(-8px);
      }
    }

    .topbar {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 24px;
      align-items: start;
    }

    .eyebrow {
      display: inline-flex;
      width: fit-content;
      align-items: center;
      gap: 9px;
      padding: 8px 13px;
      border-radius: 999px;
      color: #344054;
      font-size: 14px;
      font-weight: 800;
      background: rgba(255, 255, 255, 0.78);
      border: 1px solid var(--line);
    }

    .eyebrow::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
    }

    h1 {
      margin: 14px 0 9px;
      font-family: Montserrat, Arial, "PingFang SC", "Microsoft YaHei", sans-serif;
      font-size: clamp(39px, 5vw, 70px);
      line-height: 1.04;
      letter-spacing: 0;
    }

    .summary {
      max-width: 870px;
      margin: 0;
      color: var(--muted);
      font-size: 18px;
      line-height: 1.65;
    }

    .icon-mark {
      width: 104px;
      height: 104px;
      display: grid;
      place-items: center;
      border-radius: 28px;
      color: white;
      font-size: 38px;
      font-weight: 950;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      box-shadow: 0 22px 46px rgba(17, 24, 39, 0.16);
      animation: float 4.8s ease-in-out infinite;
    }

    .value-grid,
    .term-grid,
    .trend-grid,
    .job-grid {
      position: relative;
      z-index: 1;
      display: grid;
      gap: 15px;
      align-items: stretch;
    }

    .value-grid {
      grid-template-columns: repeat(5, 1fr);
    }

    .term-grid {
      grid-template-columns: repeat(4, 1fr);
      grid-auto-rows: 126px;
      align-items: stretch;
      align-content: start;
    }

    .trend-grid {
      grid-template-columns: repeat(5, 1fr);
    }

    .job-grid {
      grid-template-columns: repeat(4, 1fr);
    }

    .course-grid {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: 1.45fr 0.85fr;
      gap: 18px;
      align-items: stretch;
      min-height: 0;
    }

    .card {
      border-radius: 20px;
      background: var(--card);
      border: 1px solid var(--line);
      box-shadow: 0 12px 30px rgba(31, 44, 72, 0.08);
    }

    .value-card,
    .trend-card,
    .job-card,
    .term-card,
    .side-card {
      padding: 20px;
    }

    .value-card {
      min-height: 246px;
      display: flex;
      flex-direction: column;
      gap: 13px;
    }

    .trend-card,
    .job-card {
      min-height: 286px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .term-card {
      min-height: 126px;
      padding: 14px 15px;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
    }

    .card h2,
    .card h3 {
      margin: 0;
      font-size: 19px;
      line-height: 1.34;
    }

    .card p {
      margin: 0;
      color: #344054;
      font-size: 15.5px;
      line-height: 1.58;
    }

    .term-card h3 {
      margin-bottom: 6px;
      color: var(--accent);
      font-size: 16px;
    }

    .term-card p {
      font-size: 13.6px;
      line-height: 1.45;
    }

    .salary {
      margin-top: 8px;
      color: var(--accent);
      font-size: clamp(28px, 3.4vw, 44px);
      line-height: 1;
      font-weight: 950;
    }

    .salary small {
      color: var(--muted);
      font-size: 16px;
      font-weight: 800;
    }

    .badge {
      width: 32px;
      height: 32px;
      display: grid;
      place-items: center;
      flex: 0 0 auto;
      border-radius: 11px;
      color: white;
      font-size: 14px;
      font-weight: 900;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
    }

    .curriculum {
      padding: 22px;
      display: grid;
      grid-template-rows: auto 1fr;
      min-height: 0;
    }

    .section-title {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }

    .lesson-list {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(5, minmax(0, 1fr));
      gap: 11px;
      margin: 0;
      padding: 0;
      list-style: none;
      counter-reset: lesson;
      height: 100%;
      min-height: 0;
    }

    .lesson-list li {
      counter-increment: lesson;
      min-height: 0;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 12px;
      border-radius: 14px;
      color: #27364f;
      font-size: 14px;
      line-height: 1.34;
      background: rgba(255, 255, 255, 0.75);
      border: 1px solid rgba(17, 24, 39, 0.075);
    }

    .lesson-list li::before {
      content: counter(lesson, decimal-leading-zero);
      color: var(--accent);
      font-weight: 950;
      font-size: 12px;
      letter-spacing: 0;
    }

    .side-stack {
      display: grid;
      grid-template-rows: repeat(3, minmax(0, 1fr));
      gap: 14px;
      min-height: 0;
    }

    .side-card {
      display: flex;
      flex-direction: column;
      justify-content: center;
      min-height: 0;
    }

    .side-card h2 {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }

    .pill-list {
      display: flex;
      flex-wrap: wrap;
      gap: 9px;
      margin-top: 12px;
    }

    .pill {
      padding: 8px 10px;
      border-radius: 999px;
      color: #27364f;
      font-size: 13px;
      font-weight: 800;
      background: rgba(255, 255, 255, 0.72);
      border: 1px solid rgba(17, 24, 39, 0.08);
    }

    .nav-button {
      position: fixed;
      top: 50%;
      z-index: 10;
      width: 54px;
      height: 54px;
      display: grid;
      place-items: center;
      border: 0;
      border-radius: 50%;
      color: #172033;
      font-size: 30px;
      cursor: pointer;
      background: rgba(255, 255, 255, 0.85);
      box-shadow: 0 14px 36px rgba(23, 32, 51, 0.16);
      transform: translateY(-50%);
      transition: transform 180ms ease, background 180ms ease;
    }

    .nav-button:hover {
      background: white;
      transform: translateY(-50%) scale(1.06);
    }

    .prev { left: 24px; }
    .next { right: 24px; }

    .footer {
      position: fixed;
      left: 50%;
      bottom: 20px;
      z-index: 10;
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 10px 16px;
      border-radius: 999px;
      color: #344054;
      font-size: 14px;
      font-weight: 800;
      background: rgba(255, 255, 255, 0.76);
      border: 1px solid rgba(255, 255, 255, 0.86);
      box-shadow: 0 14px 34px rgba(23, 32, 51, 0.11);
      transform: translateX(-50%);
      backdrop-filter: blur(14px);
    }

    .progress-track {
      width: 178px;
      height: 8px;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(23, 32, 51, 0.1);
    }

    .progress-fill {
      height: 100%;
      width: 6.25%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--blue), var(--purple), var(--green));
      transition: width 220ms ease;
    }

    @media (max-width: 1120px) {
      body {
        overflow-y: auto;
      }

      .deck {
        min-height: 100vh;
        height: auto;
        padding: 22px 18px 94px;
      }

      .slide {
        position: relative;
        width: 100%;
        min-height: auto;
        padding: 26px;
        border-radius: 22px;
      }

      .topbar,
      .value-grid,
      .course-grid,
      .term-grid,
      .trend-grid,
      .job-grid {
        grid-template-columns: 1fr;
      }

      .lesson-list {
        grid-template-columns: 1fr;
      }

      .icon-mark {
        width: 76px;
        height: 76px;
        border-radius: 21px;
        font-size: 29px;
      }

      .value-card,
      .trend-card,
      .job-card,
      .term-card {
        min-height: auto;
      }

      .nav-button {
        top: auto;
        bottom: 20px;
        width: 48px;
        height: 48px;
        font-size: 26px;
        transform: none;
      }

      .nav-button:hover {
        transform: none;
      }

      .prev { left: 18px; }
      .next { right: 18px; }
      .footer { bottom: 20px; }
      .progress-track { width: 92px; }
    }
  </style>
</head>

        lessons: ["BRD", "MRD", "PRD", "DRD", "用户调研", "竞品分析", "功能列表", "原型设计", "原型交互", "功能迭代", "优先级决策", "路线图", "AI文档辅助", "团队协作", "产品交付"],
        ability: "能够围绕 AI 应用完成用户调研、竞品分析、需求文档、原型设计、迭代规划、团队协作和项目复盘，具备初级到中级产品岗位的完整工作方法。",
        jobs: ["AI产品经理", "产品经理助理", "产品策划", "AI应用产品专员", "项目经理助理", "需求分析师", "B端产品助理", "运营产品专员"],
        salary: "8k-20k/月"
      }
    ];

    const termLevels = [
      {
        level: "LV1",
        subtitle: "入门概念：先看懂 AI 工具怎么用",
        terms: [
          ["AI", "人工智能，让机器完成理解、生成、分析和决策等任务。"],
          ["Chat box", "聊天输入框，用户向 AI 提问和下达任务的入口。"],
          ["联网搜索", "AI 调用互联网检索最新信息，补充模型自身知识。"],
          ["对话历史", "当前或历史聊天记录，帮助 AI 理解上下文。"]
        ]
      },
      {
        level: "LV2",
        subtitle: "工具使用：理解 AIGC 应用的核心操作",
        terms: [
          ["Prompt", "给 AI 的指令，决定输出方向、格式和质量。"],
          ["模型", "AI 的能力核心，负责理解输入并生成结果。"],
          ["模型版本", "同一模型的不同迭代，能力、速度和成本可能不同。"],
          ["模型类型", "按用途区分，如文本、图像、音频、视频、多模态模型。"],
          ["AI应用", "把模型能力包装成可直接使用的软件或工具。"],
          ["AIGC", "AI Generated Content，AI 生成图片、视频、文本、音乐等内容。"],
          ["Context", "上下文，AI 当前参考的信息范围。"],
          ["Memory", "记忆，让 AI 保存偏好、背景或长期信息。"],
          ["深度思考", "让模型花更多步骤分析复杂问题。"],
          ["推理", "模型根据已有信息一步步得出结论。"],
          ["RAG-知识库", "检索增强生成，让 AI 先查资料再回答。"],
          ["插件", "扩展 AI 能力的工具，如搜索、文件、日历等。"],
          ["多模态", "同时处理文字、图片、音频、视频等多种信息。"]
        ]
      },
      {
        level: "LV3",
        subtitle: "模型机制：知道 AI 输出为什么会好或不好",
        terms: [
          ["LLM", "Large Language Model，大语言模型，擅长文本理解与生成。"],
          ["开源/闭源", "开源可查看和部署模型；闭源通常由平台托管使用。"],
          ["幻觉", "AI 编造看似合理但不准确的信息。"],
          ["System Prompt", "系统级指令，规定 AI 的角色、边界和行为方式。"],
          ["温度", "控制输出随机性；温度越高越发散，越低越稳定。"],
          ["Token", "模型处理文本的基本单位，影响长度和成本。"],
          ["Markdown", "轻量排版格式，常用于生成结构化文档。"],
          ["提示词工程", "设计和优化 Prompt 的方法，提高 AI 输出质量。"]
        ]
      },
      {
        level: "LV4",
        subtitle: "应用架构：从会用工具到能设计流程",
        terms: [
          ["AGI", "通用人工智能，理论上能像人一样处理广泛任务。"],
          ["涌现", "模型规模提升后出现的新能力。"],
          ["2B/2C", "2B 面向企业客户；2C 面向个人用户。"],
          ["AI Native", "以 AI 为核心重新设计产品，而不是简单加 AI 功能。"],
          ["Agent", "能自主规划、调用工具并完成任务的 AI 智能体。"],
          ["工作流", "把多个步骤、工具和判断串成稳定执行流程。"],
          ["Vibe Coding", "用自然语言和 AI 协作快速写代码、改产品。"],
          ["API", "软件之间调用能力的接口。"],
          ["API Key", "调用 API 的密钥，用于身份认证和计费。"],
          ["Error", "错误信息，帮助定位代码、接口或流程问题。"]
        ]
      },
      {
        level: "LV5",
        subtitle: "开发协作：理解 AI 应用落地的技术语言",
        terms: [
          ["HTML", "网页结构语言，定义页面内容和层级。"],
          ["前端", "用户看到和交互的界面部分。"],
          ["后端", "负责数据、权限、接口和业务逻辑的服务部分。"],
          ["Debug/调试", "查找并修复错误的过程。"],
          ["Test/测试", "验证功能是否按预期运行。"],
          ["MCP", "Model Context Protocol，让 AI 标准化连接工具和数据源。"],
          ["Skill", "封装好的能力说明或工作流，让 AI 更稳定执行任务。"],
          ["微调/训练", "用特定数据优化模型，使其更适合某类任务。"]
        ]
      },
      {
        level: "LV6",
        subtitle: "运行部署：让作品真正跑起来",
        terms: [
          ["Terminal/终端", "用命令操作电脑和开发环境的工具。"],
          ["命令", "给系统执行的文本指令，如启动服务、安装依赖。"],
          ["环境变量/.env", "保存密钥、配置和运行参数的方式。"],
          ["服务器", "运行网站、接口或 AI 应用的远程电脑。"],
          ["端口", "服务对外通信的入口编号，如 3000、8080。"]
        ]
      },
      {
        level: "LV7",
        subtitle: "底层认知：看懂 AI 行业基础设施",
        terms: [
          ["神经网络", "模拟神经连接的计算结构，是现代 AI 的基础。"],
          ["参数", "模型内部学习到的数值，规模越大通常能力越强但成本更高。"],
          ["AI三要素", "算法、数据、算力，共同决定 AI 能力上限。"],
          ["预训练", "用海量通用数据训练模型基础能力。"],
          ["后训练", "在预训练后做对齐、强化和任务优化。"],
          ["蒸馏", "用大模型教小模型，让小模型更轻更快。"],
          ["算力", "训练和运行模型所需的计算能力。"],
          ["数据中心", "集中部署服务器、芯片和网络的 AI 基础设施。"]
        ]
      }
    ];

    const extraSlides = [
      {
        type: "trends",
        theme: ["#4f8cff", "#36c58a", "rgba(79, 140, 255, 0.1)"],
        eyebrow: "行业发展趋势",
        title: "AI 正在成为新型生产力",
        icon: "↗",
        summary: "生成式 AI 的价值不再停留在概念层，而是进入企业降本增效、内容生产、客户增长、软件研发和产品创新的核心流程。对培训课程来说，关键不是追热点，而是建立可迁移的 AI 应用能力。",
        items: [
          ["生成式AI快速发展", "从文本生成扩展到图像、视频、音频、代码和数据分析，AI 已经进入营销、电商、教育、影视、办公和软件研发等场景，企业对“能直接产出结果”的人才需求明显增加。"],
          ["多模态AI能力增强", "文字、图片、音频、视频正在被统一理解和生成。一个人可以完成过去需要文案、设计、剪辑、配音、开发协作完成的部分工作，岗位边界正在被重新定义。"],
          ["Prompt工程与工具化", "未来不是单纯会聊天，而是会拆任务、写指令、搭流程、控质量。Prompt、工作流、模板化工具和自动化脚本会成为高效率人才的标准能力。"],
          ["企业级应用增长", "企业开始把 AI 接入知识库、客服、销售、培训、报表和产品流程。RAG、Memory、Agent 等能力让 AI 从“问答工具”升级为“业务流程助手”。"],
          ["AI人才需求增加", "市场需要懂业务、懂工具、懂交付的人。既能操作 AI，又能理解内容、数据、产品或开发流程的人，会比只掌握单一软件的人更有竞争力。"]
        ]
      },
      {
        type: "jobs",
        theme: ["#8067ff", "#ffc857", "rgba(128, 103, 255, 0.1)"],
        eyebrow: "就业方向",
        title: "四类岗位路径，可讲清楚的就业价值",
        icon: "◎",
        summary: "就业不是只列岗位名称，而是要讲清楚岗位场景、能力要求和课程输出之间的对应关系。课程覆盖创意、技术、办公和产品四条路径，便于不同基础的学员选择方向。",
        items: [
          ["AI创意方向", "AI视觉设计师、品牌设计师、广告设计师、电商美工、插画师、视频剪辑师、漫剧制作师、音效设计师、AI内容创作者、数字人内容制作。"],
          ["AI技术方向", "前端开发工程师、工具开发工程师、小程序开发、AI应用开发助理、Prompt工程师、自动化流程搭建、数据可视化开发、低代码开发专员。"],
          ["AI办公方向", "数据分析助理、内容策划、企业运营助理、销售支持、行政文档专员、新媒体文案、项目报告专员、AI办公效率顾问。"],
          ["产品管理方向", "AI产品经理、产品经理助理、产品策划、需求分析师、B端产品助理、AI应用产品专员、项目经理助理、运营产品专员。"]
        ]
      }
    ];

    const slides = [
      ...courseSlides,
      ...termLevels.map((level, index) => ({
        type: "terms",
        theme: [
          ["#4f8cff", "#8067ff", "rgba(79, 140, 255, 0.1)"],
          ["#8067ff", "#36c58a", "rgba(128, 103, 255, 0.1)"],
          ["#25b7a7", "#4f8cff", "rgba(37, 183, 167, 0.1)"],
          ["#f5a524", "#8067ff", "rgba(245, 165, 36, 0.11)"],
          ["#536dfe", "#36c58a", "rgba(83, 109, 254, 0.1)"],
          ["#42b883", "#48b6ff", "rgba(66, 184, 131, 0.1)"],
          ["#ec6f9f", "#ffc857", "rgba(236, 111, 159, 0.1)"]
        ][index],
        eyebrow: `AI专业术语 · ${level.level}`,
        title: `${level.level} 术语地图`,
        icon: level.level,
        summary: level.subtitle,
        terms: level.terms
      })),
      ...extraSlides
    ];

    const deck = document.getElementById("deck");
    const pageText = document.getElementById("pageText");
    const progressFill = document.getElementById("progressFill");
    const prevButton = document.querySelector(".prev");
    const nextButton = document.querySelector(".next");
    let currentIndex = 0;

    function escapeHtml(text) {
      return String(text)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function header(slide) {
      return `
        <header class="topbar">
          <div>
            <div class="eyebrow">${escapeHtml(slide.eyebrow)}</div>
            <h1>${escapeHtml(slide.title)}</h1>
            <p class="summary">${escapeHtml(slide.summary)}</p>
          </div>
          <div class="icon-mark" aria-hidden="true">${escapeHtml(slide.icon)}</div>
        </header>
      `;
    }

    function renderCover(slide) {
      return `
        <div class="value-grid">
          ${slide.values.map((item, index) => `
            <article class="card value-card">
              <div class="badge">${String(index + 1).padStart(2, "0")}</div>
              <h2>${escapeHtml(item[0])}</h2>
              <p>${escapeHtml(item[1])}</p>
            </article>
          `).join("")}
        </div>
      `;
    }

    function renderCourse(slide) {
      return `
        <div class="course-grid">
          <article class="card curriculum">
            <div class="section-title"><div class="badge">15</div><h2>教学内容</h2></div>
            <ol class="lesson-list">
              ${slide.lessons.map((lesson) => `<li>${escapeHtml(lesson)}</li>`).join("")}
            </ol>
          </article>
          <aside class="side-stack">
            <article class="card side-card">
              <h2><span class="badge">能</span>学员最终能力</h2>
              <p>${escapeHtml(slide.ability)}</p>
            </article>
            <article class="card side-card">
              <h2><span class="badge">岗</span>就业连接</h2>
              <p>岗位覆盖从助理执行到项目交付型岗位，既能面向零基础转型，也能支持在职人员做技能升级。</p>
              <div class="pill-list">${slide.jobs.map((job) => `<span class="pill">${escapeHtml(job)}</span>`).join("")}</div>
            </article>
            <article class="card side-card">
              <h2><span class="badge">薪</span>参考薪资</h2>
              <p>结合行业初级到中级岗位区间，用于销售讲解和学员职业预期沟通。</p>
              <div class="salary">${escapeHtml(slide.salary)}</div>
            </article>
          </aside>
        </div>
      `;
    }

    function renderTerms(slide) {
      return `
        <div class="term-grid">
          ${slide.terms.map((term) => `
            <article class="card term-card">
              <h3>${escapeHtml(term[0])}</h3>
              <p>${escapeHtml(term[1])}</p>
            </article>
          `).join("")}
        </div>
      `;
    }

    function renderTrends(slide) {
      return `
        <div class="trend-grid">
          ${slide.items.map((item, index) => `
            <article class="card trend-card">
              <div class="badge">${String(index + 1).padStart(2, "0")}</div>
              <h2>${escapeHtml(item[0])}</h2>
              <p>${escapeHtml(item[1])}</p>
            </article>
          `).join("")}
        </div>
      `;
    }

    function renderJobs(slide) {
      return `
        <div class="job-grid">
          ${slide.items.map((item, index) => `
            <article class="card job-card">
              <div class="badge">${String(index + 1).padStart(2, "0")}</div>
              <h2>${escapeHtml(item[0])}</h2>
              <p>${escapeHtml(item[1])}</p>
            </article>
          `).join("")}
        </div>
      `;
    }

    function renderSlideBody(slide) {
      if (slide.type === "cover") return renderCover(slide);
      if (slide.type === "course") return renderCourse(slide);
      if (slide.type === "terms") return renderTerms(slide);
      if (slide.type === "trends") return renderTrends(slide);
      return renderJobs(slide);
    }

    function mountSlides() {
      deck.innerHTML = slides.map((slide, index) => `
        <section class="slide${index === 0 ? " active" : ""}" style="--accent:${slide.theme[0]};--accent-2:${slide.theme[1]};--tint:${slide.theme[2]};">
          ${header(slide)}
          ${renderSlideBody(slide)}
        </section>
      `).join("");
    }

    function renderSlide(index) {
      currentIndex = (index + slides.length) % slides.length;
      document.querySelectorAll(".slide").forEach((slide, slideIndex) => {
        slide.classList.toggle("active", slideIndex === currentIndex);
      });
      pageText.textContent = `${currentIndex + 1} / ${slides.length}`;
      progressFill.style.width = `${((currentIndex + 1) / slides.length) * 100}%`;
    }

    prevButton.addEventListener("click", () => renderSlide(currentIndex - 1));
    nextButton.addEventListener("click", () => renderSlide(currentIndex + 1));
    document.addEventListener("keydown", (event) => {
      if (event.key === "ArrowLeft") renderSlide(currentIndex - 1);
      if (event.key === "ArrowRight") renderSlide(currentIndex + 1);
    });

    mountSlides();
    renderSlide(0);
  </script>
</body>
</html>
